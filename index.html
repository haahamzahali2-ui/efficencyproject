<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helping Hands Referral System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #ffffff, #f8f6f0);
    color: #1a1a1a;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px;
    font-size: 2.5em;
    font-weight: 700;
    letter-spacing: 1px;
    color: #b68b2c;
    border-bottom: 2px solid rgba(212,175,55,0.3);
    background: linear-gradient(to right, #ffffff, #f3efe3);
}

/* SEARCH */
.search-area {
    text-align: center;
    margin: 20px 0;
}

.search {
    width: 500px;
    max-width: 80%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #d4af37;
    background: #fff8e1;
    font-size: 18px;
}

.clear-btn {
    padding: 10px 18px;
    margin-left: 10px;
    border-radius: 6px;
    border: none;
    background: #b68b2c;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    max-width: 1300px;
    margin: 30px auto;
    padding: 0 30px 60px 30px;
}

/* CARD */
.card {
    background: #ffffff;
    border-radius: 14px;
    padding: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid rgba(212,175,55,0.35);
    min-height: 120px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
}

.card:hover {
    transform: translateY(-5px);
}

/* MODAL */
.modal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
}

.modal.active {
    opacity:1;
    pointer-events:auto;
}

.modal-box {
    background:white;
    padding:40px;
    width:850px;
    max-width:95%;
    border-radius:14px;
}

.close {
    float:right;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>Helping Hands Referral System</header>

<div class="search-area">
<input class="search" id="search" placeholder="Search referrals..." onkeyup="searchReferrals()">
<button class="clear-btn" onclick="clearSearch()">Clear</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyl9-CY70Y5HYpIbOmFlVU0vX2fVzRRi1nrqBBx_FBUnBReu-4klLK_D3y39310MRVI7Q/exec";

let referralStats = JSON.parse(localStorage.getItem("referralStats")) || {};

const referrals = [

{ id:0,name:"*Important* Please Read Before Doing Any Referral",instructions:["Referral forms no longer need to be printed, instead they will be sent electronically, please enable patient information sharing on Athena."]},

{ id:1,name:"Gynecologist",instructions:["Ensure it’s not a preventive women’s health visit.","Go to the patient room and enter their information: <a href='https://docs.google.com/forms/d/e/1FAIpQLScfPP-kScCPwDw2k0XSg5FdQltCnMUmdLOGg1q4c_NMcr7WWQ/viewform' target='_blank'>Click Here</a>","Clinic will call the patient."]},

{ id:2,name:"Women’s Health",instructions:["Ensure it’s a preventative visit.","Use the clipboard scheduling system.","Schedule patient in Athena."]},

{ id:3,name:"Neurologist",instructions:["Neurology visits are done here.","Confirm availability.","Schedule in Athena with Dr Leon Rosenburg."]},

{ id:4,name:"Cardiologist",instructions:["Patient will receive phone call from PhysicianCareConnection.","Wait time may be long.","Backup: Primary One Health."]},

{ id:5,name:"Mammograms",instructions:["Done at OSU.","Write Mammogram + patient ID and give to Trena."]},

{ id:6,name:"Physical Therapy",instructions:["Option 1: Columbus Free Clinic Thursdays.","Option 2: Grace Linden."]},

{ id:7,name:"EKG",instructions:["Done here in lab."]},

{ id:8,name:"Annual Physicals for work or school",instructions:["Send patient to Grace Free Clinic.","<a href='https://graceclinicsoh.org/locations-hours/' target='_blank'>Click Here</a>"]},

{ id:9,name:"Urology",instructions:["Patient will receive phone call from PhysicianCareConnection."]},

{ id:10,name:"Cancer Screening",instructions:["Give Columbus Cancer Clinic sheet.","Call 614-263-5006 if needed."]},

{ id:11,name:"Podiatry",instructions:["Patient will receive phone call from PCC."]},

{ id:12,name:"Optometry",instructions:["Dwell Community Church eye exams.","1st and 3rd Monday 6-7pm."]},

{ id:13,name:"Brain and Spine",instructions:["Refer to OhioHealth tab."]},
{ id:14,name:"ENT",instructions:["Refer to OhioHealth tab."]},
{ id:15,name:"Trauma Surgery",instructions:["Refer to OhioHealth tab."]},
{ id:16,name:"Orthopedics",instructions:["Refer to OhioHealth tab."]},
{ id:17,name:"Sports Medicine",instructions:["Refer to OhioHealth tab."]},
{ id:18,name:"General Surgery",instructions:["Refer to OhioHealth tab."]},
{ id:19,name:"Oncology",instructions:["Refer to OhioHealth tab."]},

{ id:20,name:"X-Ray",instructions:["Use Radiology Assist.","Give sheet to patient."]},
{ id:21,name:"CT Scans",instructions:["Use Radiology Assist.","Give sheet to patient."]},
{ id:22,name:"MRI",instructions:["Use Radiology Assist.","Give sheet to patient."]},

{ id:23,name:"OSU Referrals",instructions:["Financial assistance available but not free.","HCAP form required."]},

{ id:24,name:"OhioHealth Referrals",instructions:["Financial assistance available.","HCAP form required."]},

{ id:25,name:"STD/STI Screenings",instructions:["Done at Columbus Public Health.","Sliding scale fees."]},

{ id:26,name:"Pregnancy Testing",instructions:["Done at Columbus Public Health.","Sliding scale fees."]},

{ id:27,name:"Immunization",instructions:["Done at Columbus Public Health.","Sliding scale fees."]},

{ id:28,name:"Colonoscopy",instructions:["Fill referral form.","Clinic will call patient."]},
{ id:29,name:"Retinopathy",instructions:["Fill referral form.","Clinic will call patient."]},
{ id:30,name:"Ultrasound",instructions:["Fill referral form.","Clinic will call patient."]},

{ id:31,name:"Dentist",instructions:["PCC","Grace Clinic","PrimaryOne"]},

{ id:32,name:"Psychiatry",instructions:["Referral required.","Patient will receive PCC call."]},

{ id:33,name:"Pain Management",instructions:["Referral required.","Patient will receive PCC call."]},

{ id:34,name:"Physiotherapy",instructions:["Referral required.","Patient will receive PCC call."]},

{ id:35,name:"Dentistry – Extractions Only",instructions:["Referral required.","Patient will receive PCC call."]},

{ id:36,name:"Pregnancy",instructions:["Referral required.","Patient will receive PCC call."]}

];

function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";
referrals.forEach(r=>{
const card=document.createElement("div");
card.className="card";
card.textContent=r.name;
card.onclick=()=>openReferral(r.id);
grid.appendChild(card);
});
}

function searchReferrals(){
const q=document.getElementById("search").value.toLowerCase();
const results=referrals.filter(r=>r.name.toLowerCase().includes(q));
const grid=document.getElementById("grid");
grid.innerHTML="";
results.forEach(r=>{
const card=document.createElement("div");
card.className="card";
card.textContent=r.name;
card.onclick=()=>openReferral(r.id);
grid.appendChild(card);
});
}

function clearSearch(){
document.getElementById("search").value="";
render();
}

function openReferral(id){

const r=referrals.find(x=>x.id==id);

if(!referralStats[r.name]) referralStats[r.name]=0;
referralStats[r.name]++;

localStorage.setItem("referralStats",JSON.stringify(referralStats));

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({referral:r.name})
}).catch(err=>console.log(err));

let content="<div class='close' onclick='closeModal()'>✕</div><h2>"+r.name+"</h2><ol>";

r.instructions.forEach(i=>content+="<li>"+i+"</li>");

content+="</ol>";

document.getElementById("modalContent").innerHTML=content;

document.getElementById("modal").classList.add("active");

}

function closeModal(){
document.getElementById("modal").classList.remove("active");
}

render();

</script>

</body>
</html>
