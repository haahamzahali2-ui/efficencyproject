<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Helping Hands Referral System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0e1f3d;
color:#e6eefc;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;

padding:20px 30px;
background:#13284b;
}

.logo-area{
display:flex;
align-items:center;
gap:15px;
}

header img{
height:60px;
}

.admin-btn{

background:#5fa7ff;
border:none;
padding:8px 14px;
border-radius:6px;
color:white;
cursor:pointer;
font-weight:600;

}

/* SEARCH */

.search-container{
text-align:center;
margin:30px 0;
}

.search{
width:320px;
max-width:80%;
padding:12px;
border-radius:8px;
border:none;
background:#162f5c;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
padding:0 25px;
}

/* CARD */

.card{
background:#162f5c;
padding:30px;
border-radius:12px;
text-align:center;
font-weight:600;
font-size:1.2em;
cursor:pointer;
border:1px solid #3c5c93;
transition:.25s;
}

.card:hover{
background:#1b3b74;
transform:translateY(-4px);
}

/* MODAL */

.modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.65);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;
transition:.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-box{

background:#13284b;

width:90%;
max-width:650px;

padding:35px;

border-radius:12px;

}

.modal-box h2{
color:#7da7ff;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:28px;
cursor:pointer;
}

/* ADMIN EDIT */

textarea{

width:100%;
height:200px;

background:#0e1f3d;

color:white;

border:none;

padding:10px;

border-radius:6px;

margin-top:10px;

}

.save-btn{

margin-top:10px;

background:#5fa7ff;

border:none;

padding:10px 14px;

color:white;

border-radius:6px;

cursor:pointer;

}

</style>
</head>
<body>

<header>

<div class="logo-area">

<img src="logo.png">

<h2>Helping Hands Referral</h2>

</div>

<button class="admin-btn" onclick="adminLogin()">Admin</button>

</header>


<div class="search-container">

<input
type="text"
class="search"
id="search"
placeholder="Search referrals..."
onkeyup="searchCards()"
/>

</div>


<div class="grid">

<div class="card" onclick="openModal('cardio')">Cardiologist</div>

<div class="card" onclick="openModal('gyn')">Gynecologist</div>

<div class="card" onclick="openModal('pt')">Physical Therapy</div>

</div>


<div class="modal" id="modal">

<div class="close" onclick="closeModal()">✕</div>

<div class="modal-box" id="modalContent"></div>

</div>


<script>

let adminMode=false

const PASSCODE="1234"


let content={

cardio:`
<h2>Cardiologist</h2>

<ol>
<li>Print referral order.</li>
<li>Patient receives call from PhysicianCareConnection.</li>
<li>This is the only free cardiology option.</li>
</ol>
`,

gyn:`
<h2>Gynecologist</h2>

<ol>
<li>Confirm this is NOT a preventive visit.</li>
<li>Print referral order.</li>
<li>Enter patient info into form.</li>
</ol>
`,

pt:`
<h2>Physical Therapy</h2>

<ol>
<li>Print referral order.</li>
<li>Fill out referral form.</li>
<li>Patient will receive confirmation call.</li>
</ol>
`

}


/* OPEN REFERRAL */

function openModal(type){

document.getElementById("modal").classList.add("active")

if(adminMode){

document.getElementById("modalContent").innerHTML=`

<h2>Editing: ${type}</h2>

<textarea id="editBox">${content[type]}</textarea>

<button class="save-btn" onclick="saveEdit('${type}')">Save</button>

`

}

else{

document.getElementById("modalContent").innerHTML=content[type]

}

}


/* SAVE EDIT */

function saveEdit(type){

let newText=document.getElementById("editBox").value

content[type]=newText

alert("Saved!")

}


/* CLOSE */

function closeModal(){

document.getElementById("modal").classList.remove("active")

}


/* ADMIN LOGIN */

function adminLogin(){

let code=prompt("Enter admin passcode")

if(code===PASSCODE){

adminMode=true

alert("Admin mode enabled")

}

else{

alert("Incorrect passcode")

}

}


/* SEARCH */

function searchCards(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

card.style.display=

card.textContent.toLowerCase().includes(input)

? "block"
: "none"

})

}

</script>

</body>
</html>
