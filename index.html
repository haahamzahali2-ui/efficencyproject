<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helping Hands Referral System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0e1f3d;
color:#e6eefc;
}

/* HEADER */

header{

display:flex;
align-items:center;
justify-content:center;
gap:20px;

padding:35px 20px;

background:#13284b;

border-bottom:2px solid #4f6fa6;

}

header img{
height:70px;
}

header h1{
margin:0;
font-size:2em;
color:#e6eefc;
}

/* SEARCH BAR */

.search-container{
text-align:center;
margin-top:35px;
}

.search{

width:320px;
max-width:80%;

padding:12px 16px;

border-radius:8px;

border:none;

font-size:15px;

background:#162f5c;

color:white;

outline:none;

}

.search::placeholder{
color:#9fb6e6;
}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:25px;

max-width:1100px;

margin:40px auto;

padding:0 25px;

}

/* CARD */

.card{

background:#162f5c;

padding:30px;

border-radius:14px;

text-align:center;

font-weight:600;

font-size:1.2em;

cursor:pointer;

transition:.25s;

border:1px solid #3c5c93;

}

.card:hover{

transform:translateY(-5px);

background:#1b3b74;

}

/* MODAL */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.65);

display:flex;

align-items:center;

justify-content:center;

opacity:0;

pointer-events:none;

transition:.3s;

}

.modal.active{

opacity:1;

pointer-events:auto;

}

.modal-box{

background:#13284b;

max-width:650px;

width:90%;

padding:40px;

border-radius:14px;

box-shadow:0 25px 60px rgba(0,0,0,0.5);

}

.modal-box h2{
color:#7da7ff;
}

.modal-box ol{
line-height:1.6em;
}

/* CLOSE */

.close{

position:absolute;

top:20px;
right:30px;

font-size:30px;

color:white;

cursor:pointer;

}

/* BUTTON */

.button-link{

display:inline-block;

margin-top:15px;

padding:10px 16px;

background:#5fa7ff;

color:white;

text-decoration:none;

border-radius:6px;

font-weight:600;

}

</style>
</head>
<body>

<header>

<img src="logo.png">

<h1>Helping Hands Referral System</h1>

</header>


<div class="search-container">

<input
type="text"
class="search"
id="search"
placeholder="Search referrals..."
onkeyup="searchCards()"
/>

</div>


<div class="grid" id="grid">

<div class="card" onclick="openModal('gyn')">
Gynecologist
</div>

<div class="card" onclick="openModal('cardio')">
Cardiologist
</div>

<div class="card" onclick="openModal('pt')">
Physical Therapy
</div>

</div>


<div class="modal" id="modal">

<div class="close" onclick="closeModal()">✕</div>

<div class="modal-box" id="modalContent"></div>

</div>


<script>

/* REFERRAL CONTENT */

const content = {

gyn: `
<h2>Gynecologist Referral</h2>

<ol>
<li>Confirm this is NOT a preventive women's health visit.</li>
<li>Print the referral order and place in bin.</li>
<li>Enter patient information in the referral form.</li>
</ol>

<a class="button-link" href="#">Open Referral Form</a>
`,

cardio: `
<h2>Cardiologist Referral</h2>

<ol>
<li>Print referral order.</li>
<li>Patient will receive a phone call from PhysicianCareConnection.</li>
<li>This is the only free cardiology option.</li>
</ol>
`,

pt: `
<h2>Physical Therapy Referral</h2>

<ol>
<li>Print referral order.</li>
<li>Fill out the referral form.</li>
<li>Patient will receive a confirmation phone call.</li>
</ol>

<a class="button-link" href="#">Open Form</a>
`

};


/* OPEN MODAL */

function openModal(type){

document.getElementById("modal").classList.add("active");

document.getElementById("modalContent").innerHTML = content[type];

}


/* CLOSE MODAL */

function closeModal(){

document.getElementById("modal").classList.remove("active");

}


/* ESC KEY CLOSE */

window.addEventListener("keydown",function(e){

if(e.key === "Escape") closeModal();

});


/* SEARCH */

function searchCards(){

let input = document.getElementById("search").value.toLowerCase();

let cards = document.querySelectorAll(".card");

cards.forEach(card=>{

let text = card.textContent.toLowerCase();

card.style.display = text.includes(input) ? "block" : "none";

});

}

</script>

</body>
</html>
