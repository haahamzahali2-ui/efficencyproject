<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Helping Hands Referral System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;

background:linear-gradient(135deg,#ffffff,#f7f4ea);

color:#1a1a1a;
}

/* HEADER */

header{
text-align:center;
padding:50px 20px;

border-bottom:2px solid rgba(212,175,55,0.35);

background:linear-gradient(to right,#ffffff,#f3efe3);
}

header h1{
margin:0;

font-size:2.6em;

background:linear-gradient(135deg,#d4af37,#b68b2c);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:25px;

max-width:1100px;

margin:50px auto;

padding:0 25px;

}

/* CARD */

.card{

background:white;

padding:30px;

border-radius:16px;

text-align:center;

font-weight:600;

font-size:1.2em;

cursor:pointer;

border:1px solid rgba(212,175,55,0.35);

box-shadow:0 10px 30px rgba(212,175,55,0.08);

transition:.3s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:0 18px 40px rgba(212,175,55,0.18);

}

/* MODAL OVERLAY */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.55);

backdrop-filter:blur(6px);

display:flex;

align-items:center;

justify-content:center;

opacity:0;

pointer-events:none;

transition:.3s;

}

.modal.active{

opacity:1;

pointer-events:auto;

}

/* MODAL CONTENT */

.modal-box{

background:white;

max-width:650px;

width:90%;

padding:40px;

border-radius:18px;

box-shadow:0 25px 70px rgba(0,0,0,0.35);

animation:pop .25s ease;

}

@keyframes pop{

from{
transform:scale(.92);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.modal-box h2{

margin-top:0;

color:#b68b2c;

}

.modal-box ol{

line-height:1.6em;

}

/* CLOSE BUTTON */

.close{

position:absolute;

top:25px;
right:35px;

font-size:28px;

color:white;

cursor:pointer;

}

.button-link{

display:inline-block;

margin-top:15px;

padding:10px 16px;

background:linear-gradient(135deg,#d4af37,#b68b2c);

color:white;

text-decoration:none;

border-radius:8px;

font-weight:600;

}

</style>
</head>
<body>

<header>

<h1>Helping Hands Referral System</h1>

</header>

<div class="grid">

<div class="card" onclick="openModal('gyn')">
Gynecologist
</div>

<div class="card" onclick="openModal('cardio')">
Cardiologist
</div>

<div class="card" onclick="openModal('pt')">
Physical Therapy
</div>

</div>


<!-- MODAL -->

<div class="modal" id="modal">

<div class="close" onclick="closeModal()">✕</div>

<div class="modal-box" id="modalContent">

</div>

</div>


<script>

const content = {

gyn: `
<h2>Gynecologist Referral</h2>

<ol>
<li>Confirm this is NOT a preventive women's health visit.</li>
<li>Print the referral order and place in bin.</li>
<li>Enter patient information in the referral form.</li>
</ol>

<a class="button-link" href="#">Open Referral Form</a>
`,

cardio: `
<h2>Cardiologist Referral</h2>

<ol>
<li>Print referral order.</li>
<li>Tell patient they will receive a phone call from PhysicianCareConnection.</li>
<li>This is currently the only free cardiology option.</li>
</ol>
`,

pt: `
<h2>Physical Therapy Referral</h2>

<ol>
<li>Print referral order.</li>
<li>Fill out the PT referral form.</li>
<li>Patient will receive a phone call to confirm appointment.</li>
</ol>

<a class="button-link" href="#">Open Form</a>
`

};


function openModal(type){

document.getElementById("modal").classList.add("active");

document.getElementById("modalContent").innerHTML = content[type];

}

function closeModal(){

document.getElementById("modal").classList.remove("active");

}

window.addEventListener("keydown",function(e){

if(e.key === "Escape") closeModal();

});

</script>

</body>
</html>
