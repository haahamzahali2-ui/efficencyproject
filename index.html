<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Helping Hands Referral System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0e1f3d;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px 40px;
  background:#13284b;
  font-size:24px;
  font-weight:600;
}

/* SEARCH */
.search-area {
  text-align:center;
  margin:30px;
}
.search {
  width:400px;
  padding:12px;
  border-radius:6px;
  border:none;
  background:#162f5c;
  color:white;
}

/* CATEGORY */
.categories {
  text-align:center;
  margin-bottom:20px;
}
.cat-btn {
  background:#1b3b74;
  border:none;
  padding:8px 14px;
  margin:4px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card {
  background:#162f5c;
  padding:25px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
  text-align:center;
}
.card:hover {
  background:#1d3e77;
  transform:translateY(-3px);
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.7);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.modal.active {
  opacity:1;
  pointer-events:auto;
}
.modal-box {
  background:#13284b;
  padding:40px;
  width:600px;
  max-width:90%;
  border-radius:10px;
}
.close {
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
Helping Hands Referral System
</header>

<div class="search-area">
<input
  class="search"
  id="search"
  placeholder="Search referrals..."
  onkeyup="searchReferrals()">
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <div class="modal-box" id="modalContent"></div>
</div>

<script>
// REFERRALS
let referrals=[
  {
    id:1,
    name:"Cardiologist",
    category:"Cardiology",
    instructions:[
      "Print referral order",
      "Patient receives call from PhysicianCareConnection",
      "Only free cardiology option"
    ]
  },
  {
    id:2,
    name:"Gynecologist",
    category:"Women's Health",
    instructions:[
      "Confirm NOT preventive visit",
      "Print referral order",
      "Enter patient info in referral form"
    ]
  },
  {
    id:3,
    name:"Physical Therapy",
    category:"Rehabilitation",
    instructions:[
      "Print referral order",
      "Fill PT form",
      "Patient receives confirmation call"
    ]
  }
];

// RENDER CARDS
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  referrals.forEach(r=>{
    let card=document.createElement("div");
    card.className="card";
    card.textContent=r.name;
    card.onclick=()=>openReferral(r.id);
    grid.appendChild(card);
  });
  renderCategories();
}

// CATEGORY BUTTONS
function renderCategories(){
  const cats=[...new Set(referrals.map(r=>r.category))];
  const container=document.getElementById("categories");
  container.innerHTML="";
  cats.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="cat-btn";
    btn.textContent=c;
    btn.onclick=()=>filterCategory(c);
    container.appendChild(btn);
  });
}

// FILTER
function filterCategory(cat){
  const results=referrals.filter(r=>r.category==cat);
  displayResults(results);
}
function displayResults(list){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  list.forEach(r=>{
    const card=document.createElement("div");
    card.className="card";
    card.textContent=r.name;
    card.onclick=()=>openReferral(r.id);
    grid.appendChild(card);
  });
}

// SEARCH
function searchReferrals(){
  const q=document.getElementById("search").value.toLowerCase();
  const results=referrals.filter(r=>
    r.name.toLowerCase().includes(q) ||
    r.instructions.join(" ").toLowerCase().includes(q)
  );
  displayResults(results);
}

// OPEN MODAL
function openReferral(id){
  const r=referrals.find(x=>x.id==id);
  let content="<h2>"+r.name+"</h2><ol>";
  r.instructions.forEach(i=>{
    content+="<li>"+i+"</li>";
  });
  content+="</ol>";
  document.getElementById("modalContent").innerHTML=content;
  document.getElementById("modal").classList.add("active");
}

// CLOSE MODAL
function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

// START
render();
</script>

</body>
</html>
