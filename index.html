<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Helping Hands Referral System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0e1f3d;
  color:white;
}
/* HEADER */
header {
  text-align:center;
  padding:20px 0;
  background:#13284b;
  font-size:26px;
  font-weight:600;
}

/* SEARCH */
.search-area {
  text-align:center;
  margin:20px 0;
}
.search {
  width:450px;
  padding:12px;
  border-radius:6px;
  border:none;
  background:#162f5c;
  color:white;
  font-size:16px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  max-width:1000px;
  margin:20px auto;
  padding:0 20px 40px 20px;
}

/* CARD */
.card {
  background:#162f5c;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
  text-align:center;
  font-weight:500;
}
.card:hover {
  background:#1d3e77;
  transform:translateY(-3px);
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.7);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.modal.active {
  opacity:1;
  pointer-events:auto;
}
.modal-box {
  background:#13284b;
  padding:40px;
  width:700px;
  max-width:95%;
  border-radius:10px;
  overflow-y:auto;
  max-height:90%;
}
.close {
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
.modal-box a {
  color:#ffd700;
  text-decoration:none;
  font-weight:600;
}
.modal-box a:hover {
  text-decoration:underline;
}
</style>
</head>
<body>

<header>Helping Hands Referral System</header>

<div class="search-area">
  <input
    class="search"
    id="search"
    placeholder="Search referrals..."
    onkeyup="searchReferrals()">
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <div class="modal-box" id="modalContent"></div>
</div>

// RENDER CARDS
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  referrals.forEach(r=>{
    const card=document.createElement("div");
    card.className="card";
    card.textContent=r.name;
    card.onclick=()=>openReferral(r.id);
    grid.appendChild(card);
  });
}

// SEARCH FUNCTION
function searchReferrals(){
  const q=document.getElementById("search").value.toLowerCase();
  const results = referrals.filter(r=>
    r.name.toLowerCase().includes(q) ||
    r.instructions.join(" ").toLowerCase().includes(q)
  );
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  results.forEach(r=>{
    const card=document.createElement("div");
    card.className="card";
    card.textContent=r.name;
    card.onclick=()=>openReferral(r.id);
    grid.appendChild(card);
  });
}

// MODAL FUNCTIONS
function openReferral(id){
  const r=referrals.find(x=>x.id==id);
  let content="<h2>"+r.name+"</h2><ol>";
  r.instructions.forEach(i=>{
    content+="<li>"+i+"</li>";
  });
  content+="</ol>";
  document.getElementById("modalContent").innerHTML=content;
  document.getElementById("modal").classList.add("active");
}
function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

// INITIAL RENDER
render();
</script>

</body>
</html>
